<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>محرر التصميم الذكي AI</title>
    
    <!-- الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Fabric.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ✅ CSS محلي (الرابط صحيح: الملف في نفس المجلد) -->
    <link rel="stylesheet" href="style.css">
    
    <!-- أنماط إضافية -->
    <style>
        .canvas-toolbar{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:#0d0d16;border-bottom:1px solid #1e1e30}
        .quick-tools{display:flex;gap:8px}
        .tool-icon{background:#1a1a2e;border:none;color:#aaa;padding:8px;border-radius:6px;cursor:pointer;font-size:1rem}
        .tool-icon:hover{background:#6c63ff;color:#fff}
        .inline-text-editor{position:absolute;background:transparent;border:2px dashed #6c63ff;outline:none;color:inherit;font-family:inherit;min-width:60px;min-height:30px;padding:6px;z-index:100;white-space:pre-wrap;word-break:break-word;border-radius:4px;display:none}
        .inline-text-editor:focus{border-style:solid}
    </style>
</head>
<body>
    <div class="app-container">
        <!-- الشريط الجانبي -->
        <aside class="sidebar">
            <div class="logo"><i class="fa-solid fa-wand-magic-sparkles"></i> <span>مُصمِّم AI</span> <span class="version">v3.0</span></div>
            
            <div class="panel">
                <h3>🧠 تصميم بالذكاء الاصطناعي</h3>
                <textarea id="aiPrompt" placeholder="مثال: بوستر لمطعم برجر عصري..." rows="3"></textarea>
                <button id="generateAIBtn" class="btn-primary"><i class="fa-solid fa-robot"></i> توليد التصميم</button>
                <div id="aiLoader" class="loader" style="display:none;">جارٍ التصميم...</div>
            </div>
            
            <div class="panel">
                <h3>✨ مولد شعارات</h3>
                <textarea id="logoPrompt" placeholder="اسم الشركة، المجال..." rows="2"></textarea>
                <button id="generateLogoBtn" class="btn-primary"><i class="fa-solid fa-signature"></i> توليد شعار</button>
            </div>
            
            <div class="panel">
                <h3>📚 القوالب الذكية</h3>
                <div id="templateGrid" class="template-grid"></div>
            </div>
            
            <div class="panel">
                <h3>✏️ أدوات يدوية</h3>
                <button id="addTextBtn" class="btn-secondary"><i class="fa-solid fa-font"></i> إضافة نص</button>
                <button id="addImageBtn" class="btn-secondary"><i class="fa-solid fa-image"></i> إضافة صورة</button>
                <input type="file" id="imageUpload" accept="image/*" style="display:none;">
                <div class="color-picker-group"><label>لون الخلفية:</label><input type="color" id="bgColorPicker" value="#1e1e2f"></div>
                <button id="randomPaletteBtn" class="btn-secondary"><i class="fa-solid fa-palette"></i> ألوان متناسقة</button>
            </div>
            
            <div class="panel">
                <h3>📐 محاذاة</h3>
                <div class="align-buttons">
                    <button id="alignLeft" title="يسار"><i class="fa-solid fa-align-left"></i></button>
                    <button id="alignCenterH" title="وسط أفقي"><i class="fa-solid fa-align-center"></i></button>
                    <button id="alignRight" title="يمين"><i class="fa-solid fa-align-right"></i></button>
                    <button id="alignTop" title="أعلى"><i class="fa-solid fa-align-justify fa-rotate-270"></i></button>
                    <button id="alignMiddleV" title="وسط عمودي"><i class="fa-solid fa-align-justify"></i></button>
                    <button id="alignBottom" title="أسفل"><i class="fa-solid fa-align-justify fa-rotate-90"></i></button>
                </div>
            </div>
            
            <div class="panel" id="selectedSettings" style="display:none;">
                <h3>⚙️ تأثيرات العنصر</h3>
                <div class="setting-row"><label>اللون:</label><input type="color" id="textColorPicker" value="#ffffff"></div>
                <div class="setting-row"><label>الخط:</label><select id="fontFamilySelect"><option value="Cairo">Cairo</option><option value="Tajawal">Tajawal</option><option value="Arial">Arial</option></select></div>
                <div class="setting-row"><label>الشفافية:</label><input type="range" id="opacitySlider" min="0.1" max="1" step="0.1" value="1"></div>
                <div class="setting-row"><label>الظل:</label><button id="toggleShadow" class="btn-sm">تفعيل</button></div>
                <div class="setting-row"><label>حدود:</label><input type="range" id="strokeWidth" min="0" max="10" value="0"><input type="color" id="strokeColor" value="#000000"></div>
                <div class="setting-row"><label>تدوير:</label><input type="range" id="rotationSlider" min="-180" max="180" value="0"></div>
                <button id="deleteSelectedBtn" class="btn-danger"><i class="fa-solid fa-trash"></i> حذف العنصر</button>
            </div>
            
            <div class="panel">
                <h3>📑 الطبقات</h3>
                <ul id="layersList" class="layers-list"></ul>
                <button id="bringForward" class="btn-sm"><i class="fa-solid fa-arrow-up"></i> للأمام</button>
                <button id="sendBackward" class="btn-sm"><i class="fa-solid fa-arrow-down"></i> للخلف</button>
            </div>
            
            <div class="panel">
                <h3>💾 تحكم عام</h3>
                <div class="action-row">
                    <button id="undoBtn" class="btn-sm" title="تراجع"><i class="fa-solid fa-undo"></i></button>
                    <button id="redoBtn" class="btn-sm" title="إعادة"><i class="fa-solid fa-redo"></i></button>
                    <button id="exportBtn" class="btn-primary"><i class="fa-solid fa-download"></i> PNG</button>
                </div>
            </div>
        </aside>
        
        <main class="canvas-area">
            <div class="canvas-toolbar">
                <div class="size-presets">
                    <button data-width="800" data-height="600" class="preset-btn active">1:1</button>
                    <button data-width="800" data-height="1200" class="preset-btn">Story</button>
                    <button data-width="1240" data-height="1754" class="preset-btn">A4</button>
                </div>
                <div class="quick-tools">
                    <button class="tool-icon" id="penToolBtn" title="أداة القلم"><i class="fa-solid fa-pen-fancy"></i></button>
                    <button class="tool-icon" id="removeBgBtn" title="إزالة الخلفية"><i class="fa-solid fa-eraser"></i></button>
                    <button class="tool-icon" id="faceEditBtn" title="تعديل الوجه"><i class="fa-solid fa-face-smile"></i></button>
                    <button class="tool-icon" id="enhanceBtn" title="تحسين AI"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
                    <button class="tool-icon" id="ttsBtn" title="نص إلى كلام"><i class="fa-solid fa-volume-high"></i></button>
                </div>
            </div>
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="designCanvas"></canvas>
                <div id="inlineTextEditor" class="inline-text-editor" contenteditable="true"></div>
            </div>
        </main>
    </div>
    
    <!-- ✅ JavaScript محلي (الروابط صحيحة: الملفات في نفس المجلد) -->
    <script src="canvas.js"></script>
    <script src="ai.js"></script>
    <script src="ui.js"></script>
</body>
</html>
